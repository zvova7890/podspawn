name: Build and Publish Deb Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            dh-make \
            fakeroot \
            lintian \
            dpkg-dev

      - name: Set package version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SCRIPT_VERSION=$(sed -n 's/^VERSION="\([^"]*\)"$/\1/p' podspawn.sh)
          PACKAGE_VERSION=$(dpkg-parsechangelog -S Version)
          PACKAGE_UPSTREAM_VERSION=${PACKAGE_VERSION%-*}

          if [[ "$SCRIPT_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match podspawn.sh version $SCRIPT_VERSION"
            exit 1
          fi
          if [[ "$PACKAGE_UPSTREAM_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Debian package version $PACKAGE_VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $PACKAGE_VERSION"

      - name: Build deb package
        run: |
          # If you have a debian/ directory with package metadata
          dpkg-buildpackage -us -uc -b

          # Move built packages to a directory inside the workspace
          mkdir -p deb-packages
          mv ../*.deb deb-packages/ || true
          mv ../*.changes deb-packages/ || true
          mv ../*.buildinfo deb-packages/ || true

      - name: Run lintian
        run: |
          lintian deb-packages/*.deb || true
        continue-on-error: true

      - name: List built packages
        run: |
          ls -lh deb-packages/
          dpkg-deb --info deb-packages/*.deb

      - name: Upload deb packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-ubuntu-24.04
          path: deb-packages/*.deb
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: deb-packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
